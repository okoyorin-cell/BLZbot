# Déploie le code sur PebbleHost (SFTP) à chaque push sur main.
# Le .env reste sur le serveur (non versionné) — il n’est pas écrasé.
#
# Active le déploiement : GitHub → Settings → Secrets and variables → Actions
#   - Variable (onglet Variables) : PEBBLE_DEPLOY = 1
#   - Secrets (onglet Secrets) : voir doc/DEPLOY-PEBBLE.md
#
name: Deploy PebbleHost (SFTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pebble
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync fichiers vers Pebble (SFTP)
    runs-on: ubuntu-latest
    # Définis la variable repo PEBBLE_DEPLOY=1 quand les secrets SFTP sont configurés
    if: vars.PEBBLE_DEPLOY == '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer le dossier à envoyer (sans .git / node_modules / bruit)
        run: |
          mkdir -p _deploy_out
          rsync -a \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='modération/node_modules' \
            --exclude='niveau/node_modules' \
            --exclude='.github' \
            --exclude='_deploy_out' \
            --exclude='*.log' \
            ./ _deploy_out/

      - name: Port SFTP (défaut 22 si secret vide)
        id: sftp_port
        run: |
          P="${{ secrets.PEBBLE_SFTP_PORT }}"
          if [ -z "$P" ]; then P="22"; fi
          echo "port=$P" >> "$GITHUB_OUTPUT"

      # Paramiko : SFTP pur, gère mieux mots de passe spéciaux que lftp en ligne de commande.
      - name: Déployer en SFTP (Python + paramiko)
        env:
          SFTP_HOST: ${{ secrets.PEBBLE_SFTP_HOST }}
          SFTP_USER: ${{ secrets.PEBBLE_SFTP_USERNAME }}
          SFTP_PASS: ${{ secrets.PEBBLE_SFTP_PASSWORD }}
          REMOTE_BASE: ${{ secrets.PEBBLE_REMOTE_PATH }}
          SFTP_PORT: ${{ steps.sftp_port.outputs.port }}
        run: |
          set -euo pipefail
          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${SFTP_PASS:-}" ] || [ -z "${REMOTE_BASE:-}" ]; then
            echo "::error::Secret(s) manquant(s) : PEBBLE_SFTP_HOST, USERNAME, PASSWORD ou REMOTE_PATH."
            exit 1
          fi
          python3 -m pip install --user --quiet paramiko
          export PATH="$HOME/.local/bin:$PATH"
          python3 << 'PY'
          import os
          import sys

          import paramiko

          host = os.environ["SFTP_HOST"].strip()
          port = int(os.environ["SFTP_PORT"].strip())
          user = os.environ["SFTP_USER"].strip()
          password = os.environ["SFTP_PASS"]
          remote_base = os.environ["REMOTE_BASE"].strip().rstrip("/")
          local_root = os.path.join(os.environ["GITHUB_WORKSPACE"], "_deploy_out")

          if not os.path.isdir(local_root):
              print("::_error::_deploy_out introuvable après rsync", file=sys.stderr)
              sys.exit(1)

          print(f"Connexion SFTP {user}@{host}:{port} → {remote_base} …")

          client = paramiko.SSHClient()
          client.set_missing_host_key_policy(paramiko.AutoAddPolicy())

          try:
              client.connect(
                  hostname=host,
                  port=port,
                  username=user,
                  password=password,
                  timeout=90,
                  allow_agent=False,
                  look_for_keys=False,
              )
          except paramiko.AuthenticationException:
              print("::_error::Authentification SFTP refusée (utilisateur ou mot de passe).", file=sys.stderr)
              sys.exit(1)
          except Exception as e:
              print(f"::_error::Connexion impossible ({type(e).__name__}): {e}", file=sys.stderr)
              sys.exit(1)

          sftp = client.open_sftp()

          try:
              sftp.stat(remote_base)
          except OSError as e:
              print(f"::_error::Dossier distant introuvable : {remote_base!r} ({e})", file=sys.stderr)
              print("::_error::Vérifie le secret PEBBLE_REMOTE_PATH (ex. /home/container).", file=sys.stderr)
              sys.exit(1)

          def upload_dir(local: str, remote: str) -> None:
              for name in sorted(os.listdir(local)):
                  lp = os.path.join(local, name)
                  rp = f"{remote}/{name}".replace("//", "/")
                  if os.path.isdir(lp):
                      try:
                          sftp.mkdir(rp)
                      except OSError:
                          pass
                      upload_dir(lp, rp)
                  else:
                      sftp.put(lp, rp)

          upload_dir(local_root, remote_base)
          sftp.close()
          client.close()
          print("Déploiement SFTP terminé.")
          PY
