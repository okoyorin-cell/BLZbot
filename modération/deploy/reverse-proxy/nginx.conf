# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — alternative à Caddy si tu préfères nginx
# ─────────────────────────────────────────────────────────────────────────────
# À placer dans /etc/nginx/sites-available/verif.conf puis
#   sudo ln -s /etc/nginx/sites-available/verif.conf /etc/nginx/sites-enabled/
#
# Prérequis : avoir obtenu un certif Let's Encrypt avec :
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot certonly --nginx -d verif.tondomaine.com
#
# Variables à remplacer :
#   verif.tondomaine.com   → ton sous-domaine pointé sur l'IP du VPS
#   PEBBLE_IP              → l'IP publique de ton serveur Pebble
#   3782                   → port HTTP du bot (var HTTP_PORT côté Pebble)
#   <SECRET_LONG>          → idem VERIFY_PROXY_SECRET côté Pebble
# ─────────────────────────────────────────────────────────────────────────────

# Rate limit : 10 req/s par IP, burst 20.
limit_req_zone $binary_remote_addr zone=verif:10m rate=10r/s;

# Redirige HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name verif.tondomaine.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name verif.tondomaine.com;

    # Certif Let's Encrypt (généré par certbot)
    ssl_certificate /etc/letsencrypt/live/verif.tondomaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/verif.tondomaine.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    server_tokens off;

    # Limite de taille du body (le verif POST est <4Ko, on est large)
    client_max_body_size 64k;

    location / {
        limit_req zone=verif burst=20 nodelay;

        proxy_pass http://PEBBLE_IP:3782;
        proxy_http_version 1.1;

        # Header secret partagé : le bot Pebble vérifie cette valeur et refuse
        # toute requête qui ne l'a pas. Empêche l'accès direct si quelqu'un
        # devine l'IP de Pebble.
        proxy_set_header X-Verif-Proxy-Secret "<SECRET_LONG>";

        # Vraie IP visiteur
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Timeouts (verif = canvas + DB)
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Pas de buffering (les pages sont petites)
        proxy_buffering off;
    }

    # Logs (rotation gérée par logrotate par défaut sous Debian/Ubuntu)
    access_log /var/log/nginx/verif.access.log;
    error_log /var/log/nginx/verif.error.log warn;
}
